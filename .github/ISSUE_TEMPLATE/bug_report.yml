name: 버그 신고 / Bug report
description: PPS CLI에서 재현되는 문제를 알려주세요.
title: "[Bug] "
labels: [bug]
body:
  - type: checkboxes
    attributes:
      label: 사전 확인
      options:
        - label: 최신 릴리즈에서 재현되는지 확인했습니다.
          required: true
        - label: 토큰과 개인정보를 제거했습니다.
          required: true
  - type: input
    attributes:
      label: PPS CLI 버전
      placeholder: pps version v0.1.0
    validations:
      required: true
  - type: dropdown
    attributes:
      label: 운영체제
      options: [Windows, macOS, Linux, Other]
    validations:
      required: true
  - type: dropdown
    attributes:
      label: 아키텍처
      options: [AMD64 / x86-64, ARM64, Other]
    validations:
      required: true
  - type: textarea
    attributes:
      label: 재현 절차
      description: 실행한 명령과 최소 재현 절차를 작성해 주세요.
    validations:
      required: true
  - type: textarea
    attributes:
      label: 실제 결과
    validations:
      required: true
  - type: textarea
    attributes:
      label: 기대 결과
    validations:
      required: true
