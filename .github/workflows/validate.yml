name: Validate distribution repository

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  unix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate version and shell installer
        shell: bash
        run: |
          grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$' VERSION
          bash -n install.sh
      - name: Check required distribution files
        shell: bash
        run: |
          for file in README.md README.en.md LICENSE SECURITY.md CONTRIBUTING.md CHANGELOG.md install.sh install.ps1; do
            test -s "$file"
          done

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Parse PowerShell installer
        shell: pwsh
        run: |
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path ./install.ps1),
            [ref]$null,
            [ref]$errors
          ) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_ }
            exit 1
          }
